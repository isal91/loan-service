version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: loan-service-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: loan_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: loan-service-swagger
    ports:
      - "8081:8080"
    environment:
      API_URL: openapi.yaml
    volumes:
      - ./docs/openapi.yaml:/usr/share/nginx/html/openapi.yaml

volumes:
  pgdata:
